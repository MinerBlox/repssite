<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepsCentral - Edit Catalog</title>
  <link rel="icon" href="systemimages/repscentrallogo.png">
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #0a0a0b; }
    #catalog-frame { width: 100%; height: 100%; border: 0; display: block; }
    #admin-status {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 99999;
      max-width: min(420px, calc(100vw - 32px));
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(17,17,20,.94);
      border: 1px solid #2a2a30;
      color: #f0f0f0;
      font: 600 12px/1.4 Arial, Helvetica, sans-serif;
      box-shadow: 0 12px 32px rgba(0,0,0,.35);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity .18s ease, transform .18s ease;
    }
    #admin-status.show { opacity: 1; transform: translateY(0); }
    #admin-status.error { border-color: rgba(239,68,68,.55); color: #fecaca; }
  </style>
</head>
<body>
  <iframe id="catalog-frame" src="spreadsheet.html?editCatalog=1" title="Edit catalog"></iframe>
  <div id="admin-status" role="status" aria-live="polite"></div>
  <script type="module" src="editcatalog.js?v=2026-07-15-1"></script>
</body>
</html>
