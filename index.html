/* ── PRODUCT CARD ── */
function imgPlaceholder() {
  return `<div class="product-img"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 4-4 4 4"/><path d="M3 15l4-4 4 4 4-4 4 4"/></svg></div>`;
}

function badgeEl(type) {
  if (type === "best") return `<span class="badge badge-best">Best Batch</span>`;
  if (type === "budget") return `<span class="badge badge-budget">Budget Batch</span>`;
  return `<span class="badge badge-random">Random Batch</span>`;
}

function productCard(p) {
  return `
    <div class="product-card">
      <div style="position:relative">
        ${imgPlaceholder()}
        ${badgeEl(p.badge)}
      </div>
      <div class="product-body">
        <div class="product-name">${p.name}</div>
        <div class="product-meta">
          <span class="product-price">${p.price}</span>
          <span class="product-cat">${p.category}</span>
        </div>
        <a href="#" class="product-btn">Check more →</a>
      </div>
    </div>
  `;
}

function staticVisibleProductCount(target) {
  if (window.matchMedia("(max-width: 720px)").matches) return 1;
  const gap = 16;
  const capacity = Math.max(1, Math.floor((target.clientWidth + gap) / 216));
  return Math.max(1, capacity - 1);
}

function staticMoreProductCard(remaining) {
  return `
    <a href="spreadsheet.html" class="product-card product-more-card" aria-label="View ${remaining} more products">
      <span class="product-more-overlay"></span>
      <span class="product-more-content">+ ${remaining} more</span>
    </a>
  `;
}

function renderStaticProductRow(targetId, items) {
  const target = document.getElementById(targetId);
  if (!target) return;
  const count = Math.min(items.length, staticVisibleProductCount(target));
  target.innerHTML = items.slice(0, count).map(productCard).join("") + staticMoreProductCard(Math.max(0, items.length - count));
}

function safeDecode(value) {
  let output = value || "";
  for (let i = 0; i < 4; i++) {
    try {
      const decoded = decodeURIComponent(output);
      if (decoded === output) break;
      output = decoded;
    } catch (error) {
      break;
    }
  }
  return output;
}

function normalizePlatform(value) {
  if (!value) return null;
  const v = value.toLowerCase();
  if (v.includes("weidian") || v === "wd") return "weidian";
  if (v.includes("taobao") || v === "tb" || v.includes("tmall")) return "taobao";
  if (v.includes("1688") || v === "alibaba") return "1688";
  return null;
}

function firstUrlFromText(value) {
  const match = value.match(/https?:\/\/[^\s"'<>]+/i);
  return match ? match[0] : value.trim();
}

function extract1688Id(urlString) {
  const offerMatch = urlString.match(/offer\/(\d+)\.html/i);
  if (offerMatch) return offerMatch[1];
  try {
    const url = new URL(urlString);
    return url.searchParams.get("offerId") || url.searchParams.get("id") || null;
  } catch (error) {
    return null;
  }
}

function unwrapAgentLink(rawInput) {
  let current = firstUrlFromText(rawInput);
  const seen = new Set();
  const paramCandidates = ["url", "target", "targetUrl", "redirect", "redirectUrl", "searchInfo", "originKeywordUrl", "originUrl", "itemUrl", "goodsLink", "productLink", "link", "ru", "u"];

  for (let i = 0; i < 5; i++) {
    current = safeDecode(current).replace(/&amp;/g, "&").trim();
    if (!current || seen.has(current)) break;
    seen.add(current);

    try {
      const url = new URL(current);
      let nested = null;
      for (const key of paramCandidates) {
        const value = url.searchParams.get(key);
        if (value && /^https?:/i.test(safeDecode(value))) {
          nested = safeDecode(value);
          break;
        }
      }
      if (nested) {
        current = nested;
        continue;
      }
    } catch (error) {
      break;
    }
    break;
  }

  return current;
}

function convertLinkValue(rawInput) {
  const cleanedInput = (rawInput || "").trim();
  if (!cleanedInput) return { ok: false, reason: "Paste a link first." };

  const candidate = unwrapAgentLink(cleanedInput);
  let url;
  try {
    url = new URL(candidate);
  } catch (error) {
    return { ok: false, reason: "That does not look like a valid URL." };
  }

  const host = url.hostname.toLowerCase();
  const path = url.pathname;

  if (host.includes("hipobuy.com")) {
    if (/\/product\/(weidian|taobao|1688)\/\d+/i.test(path)) {
      return { ok: true, link: url.toString(), platform: path.split("/")[2] };
    }
    return { ok: false, reason: "This is already a HipoBuy link, but it is not in a direct product format I can normalize safely." };
  }

  if (host.includes("weidian.com") || host.includes("youshop10.com")) {
    const id = url.searchParams.get("itemID") || url.searchParams.get("itemId") || url.searchParams.get("id");
    if (id) return { ok: true, link: `https://hipobuy.com/product/weidian/${id}`, platform: "weidian" };
  }

  if (host.includes("taobao.com") || host.includes("tmall.com")) {
    const id = url.searchParams.get("id");
    if (id) return { ok: true, link: `https://hipobuy.com/product/taobao/${id}`, platform: "taobao" };
  }

  if (host.includes("1688.com") || host.includes("alibaba.com")) {
    const id = extract1688Id(url.toString());
    if (id) return { ok: true, link: `https://hipobuy.com/product/1688/${id}`, platform: "1688" };
  }

  if (host.includes("cnfans.com")) {
    const id = url.searchParams.get("id") || url.searchParams.get("spuNo");
    const platform = normalizePlatform(url.searchParams.get("shop_type") || url.searchParams.get("platform"));
    if (id && platform) return { ok: true, link: `https://hipobuy.com/product/${platform}/${id}`, platform };
  }

  if (host.includes("mulebuy.com")) {
    const id = url.searchParams.get("id");
    const platform = normalizePlatform(url.searchParams.get("platform"));
    if (id && platform) return { ok: true, link: `https://hipobuy.com/product/${platform}/${id}`, platform };
  }

  if (host.includes("acbuy.com")) {
    const id = url.searchParams.get("id");
    const platform = normalizePlatform(url.searchParams.get("source"));
    if (id && platform) return { ok: true, link: `https://hipobuy.com/product/${platform}/${id}`, platform };
  }

  if (host.includes("oopbuy.com")) {
    const match = path.match(/\/product\/(weidian|taobao|1688)\/(\d+)/i);
    if (match) return { ok: true, link: `https://hipobuy.com/product/${match[1].toLowerCase()}/${match[2]}`, platform: match[1].toLowerCase() };
  }

  if (host.includes("pandabuy.com") || host.includes("kakobuy.com") || host.includes("hoobuy.com") || host.includes("lovegobuy.com") || host.includes("orientdig.com") || host.includes("allchinabuy.com") || host.includes("superbuy.com") || host.includes("cssbuy.com")) {
    const maybeUnwrapped = unwrapAgentLink(url.toString());
    if (maybeUnwrapped !== url.toString()) return convertLinkValue(maybeUnwrapped);
  }

  const cssbuyMatch = url.toString().match(/item-(\d+)\.html/i);
  if (host.includes("cssbuy.com") && cssbuyMatch) {
    return { ok: false, reason: "I found the item ID, but CSSBuy links do not reliably expose the source platform. Paste the original Weidian, Taobao or 1688 link for a precise conversion." };
  }

  return { ok: false, reason: "I could not read a supported item ID from that link. Try the original Weidian, Taobao or 1688 product URL instead of a shortened or heavily wrapped agent link." };
}

function convertToHipoBuy() {
  const input = document.getElementById("converter-input").value;
  const output = document.getElementById("converter-output");
  const status = document.getElementById("converter-status");
  const result = convertLinkValue(input);

  if (!result.ok) {
    output.value = "";
    status.innerHTML = `<strong>Could not convert:</strong> ${result.reason}`;
    return;
  }

  output.value = result.link;
  status.innerHTML = `<strong>Converted:</strong> detected ${result.platform} and built a HipoBuy-ready link.`;
}

async function copyConvertedLink() {
  const output = document.getElementById("converter-output").value.trim();
  const status = document.getElementById("converter-status");
  if (!output) {
    status.innerHTML = `<strong>Nothing to copy:</strong> convert a link first.`;
    return;
  }
  try {
    await navigator.clipboard.writeText(output);
    status.innerHTML = `<strong>Copied:</strong> your HipoBuy link is now on the clipboard.`;
  } catch (error) {
    status.innerHTML = `<strong>Copy failed:</strong> try copying from the output box manually.`;
  }
}

function openConvertedLink() {
  const output = document.getElementById("converter-output").value.trim();
  const status = document.getElementById("converter-status");
  if (!output) {
    status.innerHTML = `<strong>Nothing to open:</strong> convert a link first.`;
    return;
  }
  window.open(output, "_blank", "noopener,noreferrer");
}
