<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Item - repscentral</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: 'DM Sans', sans-serif; background: #0a0a0b; color: #f0f0f0; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }
    :root { --bg: #0a0a0b; --surface: #111114; --surface2: #18181c; --border: #252529; --text: #f0f0f0; --muted: #8d8d95; --blue: #4da6ff; --blue-soft: rgba(77,166,255,0.12); }
    nav { position: sticky; top: 0; z-index: 20; height: 60px; display: flex; align-items: center; gap: 18px; padding: 0 28px; border-bottom: 1px solid var(--border); background: rgba(10,10,11,0.9); backdrop-filter: blur(14px); }
    .nav-logo { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: var(--text); }
    .nav-link { padding: 7px 12px; border-radius: 8px; color: var(--muted); font-size: 13px; font-weight: 700; }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    main { max-width: 1220px; margin: 0 auto; padding: 34px 28px 64px; }
    .back-link { display: inline-flex; margin-bottom: 20px; color: var(--blue); font-size: 13px; font-weight: 800; }
    .item-layout { display: grid; grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr); gap: 34px; align-items: start; }
    .image-panel { min-height: 520px; border: 1px solid var(--border); border-radius: 18px; background: var(--surface); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .item-image { width: 100%; height: 100%; min-height: 520px; object-fit: contain; padding: 22px; background: var(--surface2); }
    .image-empty { color: var(--muted); font-size: 14px; }
    .details-panel { border: 1px solid var(--border); border-radius: 18px; background: var(--surface); padding: 26px; }
    .eyebrow { display: inline-flex; align-items: center; margin-bottom: 14px; padding: 6px 10px; border: 1px solid rgba(77,166,255,0.28); border-radius: 999px; background: var(--blue-soft); color: var(--blue); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; }
    h1 { font-family: 'Syne', sans-serif; font-size: clamp(34px, 5vw, 56px); line-height: 0.98; letter-spacing: -1px; margin-bottom: 18px; }
    .price { margin-bottom: 22px; color: var(--blue); font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .detail-block { padding: 18px 0; border-top: 1px solid var(--border); }
    .detail-label { margin-bottom: 8px; color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; }
    .description { color: #d8d8dc; font-size: 15px; line-height: 1.7; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }
    .action-btn { display: inline-flex; align-items: center; justify-content: center; min-height: 44px; padding: 0 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; font-weight: 800; }
    .action-btn.primary { border-color: transparent; background: var(--blue); color: #fff; }
    .qc-section { margin-top: 34px; padding: 26px; border: 1px solid var(--border); border-radius: 18px; background: var(--surface); }
    .qc-section h2 { font-family: 'Syne', sans-serif; font-size: 24px; margin-bottom: 10px; }
    .qc-section p, .status-copy { color: var(--muted); font-size: 14px; line-height: 1.6; }
    .qc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; margin-top: 18px; }
    .qc-placeholder { min-height: 150px; border: 1px dashed #34343a; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--muted); background: #0f0f12; font-size: 13px; }
    .loading, .not-found { max-width: 680px; margin: 80px auto; padding: 30px; border: 1px solid var(--border); border-radius: 18px; background: var(--surface); text-align: center; }
    .loading h1, .not-found h1 { font-size: 34px; margin-bottom: 10px; }
    @media (max-width: 820px) { nav { padding: 0 16px; } main { padding: 24px 16px 48px; } .item-layout { grid-template-columns: 1fr; } .image-panel, .item-image { min-height: 360px; } .details-panel, .qc-section { padding: 20px; } }
  </style>
</head>
<body>
  <nav>
    <a href="/index.html?noPopup=1" class="nav-logo">repscentral</a>
    <a href="/spreadsheet.html" class="nav-link">Spreadsheet</a>
  </nav>

  <main id="app">
    <section class="loading">
      <h1>Loading item</h1>
      <p class="status-copy">Fetching product details from Firebase.</p>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, doc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDTTzoJlvr0mYxwx82cQ9JJn8rXrMEy7JA",
      authDomain: "reps-central.firebaseapp.com",
      projectId: "reps-central",
      storageBucket: "reps-central.firebasestorage.app",
      messagingSenderId: "812299387060",
      appId: "1:812299387060:web:1c93d1e7bf30b05653d7e1",
      measurementId: "G-8T7F9F1FZ9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const root = document.getElementById("app");

    function slugify(value) {
      return String(value || "")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function escapeHtml(value) {
      return String(value || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function priceText(item) {
      const value = Number(item.price || 0);
      const symbol = (item.currency || "CNY") === "CNY" ? "¥" : "$";
      return `${symbol}${value.toFixed(2)}`;
    }

    function routeSlug() {
      const queryId = new URLSearchParams(window.location.search).get("id");
      if (queryId) return queryId;
      const parts = window.location.pathname.split("/").filter(Boolean);
      const itemIndex = parts.lastIndexOf("items");
      return itemIndex >= 0 ? decodeURIComponent(parts[itemIndex + 1] || "") : "";
    }

    async function findProduct(slug) {
      if (!slug) return null;
      const directSnap = await getDoc(doc(db, "products", slug));
      if (directSnap.exists()) return { id: directSnap.id, ...directSnap.data() };

      const allSnap = await getDocs(collection(db, "products"));
      const match = allSnap.docs
        .map(productDoc => ({ id: productDoc.id, ...productDoc.data() }))
        .find(item => item.id === slug || slugify(item.name) === slug);
      return match || null;
    }

    function renderNotFound() {
      root.innerHTML = `
        <section class="not-found">
          <h1>Item not found</h1>
          <p class="status-copy">This page could not be found.</p>
          <div class="actions" style="justify-content:center;"><a class="action-btn primary" href="/spreadsheet.html">Back to spreadsheet</a></div>
        </section>
      `;
    }

    function renderProduct(item) {
      document.title = `${item.name || "Item"} - repscentral`;
      const image = item.imageUrl
        ? `<img class="item-image" src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.name || "Item image")}">`
        : `<div class="image-empty">No image yet</div>`;
      const description = item.description || "No description has been added yet.";
      const agentButton = item.agentUrl ? `<a class="action-btn primary" href="${escapeHtml(item.agentUrl)}" target="_blank" rel="noopener noreferrer">Open Agent Link</a>` : "";

      root.innerHTML = `
        <a class="back-link" href="/spreadsheet.html">Back to spreadsheet</a>
        <section class="item-layout">
          <div class="image-panel">${image}</div>
          <aside class="details-panel">
            <div class="eyebrow">Item Details</div>
            <h1>${escapeHtml(item.name || "Unnamed item")}</h1>
            <div class="price">${priceText(item)}</div>
            <div class="detail-block">
              <div class="detail-label">Name</div>
              <div class="description">${escapeHtml(item.name || "Unnamed item")}</div>
            </div>
            <div class="detail-block">
              <div class="detail-label">Price</div>
              <div class="description">${priceText(item)}</div>
            </div>
            <div class="detail-block">
              <div class="detail-label">Description</div>
              <div class="description">${escapeHtml(description)}</div>
            </div>
            <div class="actions">${agentButton}</div>
          </aside>
        </section>
        <section class="qc-section">
          <h2>QC Pictures</h2>
          <p>QC picture links will appear here once you decide how you want to store them.</p>
          <div class="qc-grid">
            <div class="qc-placeholder">QC image</div>
            <div class="qc-placeholder">QC image</div>
            <div class="qc-placeholder">QC image</div>
          </div>
        </section>
      `;
    }

    try {
      const parts = window.location.pathname.split("/").filter(Boolean);
      if (!parts.includes("items")) {
        renderNotFound();
      } else {
        const item = await findProduct(routeSlug());
        if (!item || item.isActive === false) {
          renderNotFound();
        } else {
          renderProduct(item);
        }
      }
    } catch (error) {
      console.error("Could not load item:", error);
      renderNotFound();
    }
  </script>
</body>
</html>
